name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install build cyclonedx-bom
      - name: Test
        run: python -m pip install -e ".[dev]" && pytest
      - name: Policy fixture tests
        run: capfence policy test tests/fixtures/policy-packs/starter_pack_cases.yaml
      - name: Build distributions
        run: python -m build
      - name: Generate SBOM
        run: cyclonedx-py environment -o capfence-sbom.json
      - name: Attest artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
