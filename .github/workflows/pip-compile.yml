name: Pip-Compile

on:
  pull_request:
    paths:
      - "requirements*.in"
  push:
    branches: [main, master]
    paths:
      - "requirements*.in"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Install pip-tools
        run: pip install --require-hashes -r requirements-pip-tools.txt
      - name: Compile requirements.txt
        run: |
          pip-compile --pip-args="--python-version 3.10" --generate-hashes --output-file=requirements.txt requirements.in
          pip-compile --pip-args="--python-version 3.10" --generate-hashes --output-file=requirements-dev.txt requirements-dev.in
          pip-compile --pip-args="--python-version 3.10" --generate-hashes --output-file=requirements-docs.txt requirements-docs.in
          pip-compile --pip-args="--python-version 3.10" --generate-hashes --output-file=requirements-build.txt requirements-build.in
          pip-compile --pip-args="--python-version 3.10" --generate-hashes --allow-unsafe --output-file=requirements-pip-tools.txt requirements-pip-tools.in
      - name: Check for changes
        run: git diff --exit-code
