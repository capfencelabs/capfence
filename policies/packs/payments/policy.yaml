version: 1
policy_name: payment-side-effects
description: Starter authorization policy for agent-initiated payment actions.

deny:
  - capability: payments.refund
    amount_gt: 500
  - capability: payments.refund
    contains: "unknown"

require_approval:
  - capability: payments.refund
    amount_gt: 100

allow:
  - capability: payments.refund
    amount_lte: 100
